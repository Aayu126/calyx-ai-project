services:
  # Backend Service
  - type: web
    name: calyx-ai-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: Backend
    buildCommand: pip install -r Requirements.txt
    startCommand: gunicorn server:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: FRONTEND_URL
        value: https://calyx-ai-frontend.onrender.com
      - key: GEMINI_API_KEY
        value: ""
      - key: HuggingFaceAPIKey
        value: ""
      - key: GroqAPIKey
        value: ""
      - key: JWT_SECRET
        value: "generate_a_random_string_here"

  # Frontend Static Site
  - type: static
    name: calyx-ai-frontend
    rootDir: Frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://calyx-ai-backend.onrender.com/api
